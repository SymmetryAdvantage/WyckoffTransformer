name: base_sg_batch_schedule_free

model:
  cascade:
    order:
      - elements
      - site_symmetries
      - sites_enumeration
    is_target:
      elements: true
      site_symmetries: true
      sites_enumeration: true
    embedding_size:
      elements: 16
      site_symmetries: 16
      sites_enumeration: 8
  start_token: spacegroup_number
  WyckoffTrainer_args:
    target: NextToken
    compile_model: true
    val_batch_size: 20000
    test_batch_size: 20000
    train_batch_size: 10000
    evaluation_samples: 1
    multiclass_next_token_with_order_permutation: true
  CascadeTransformer_args:
    outputs: token_scores
    start_type: one_hot
    mixer_layers: 1
    perceptron_shape: pyramid
    token_aggregation: null
    concat_token_counts: false
    aggregation_inclsion: null
    concat_token_presence: true
    TransformerEncoder_args:
      num_layers: 3
      enable_nested_tensor: false
    aggregate_after_encoder: false
    num_fully_connected_layers: 3
    TransformerEncoderLayer_args:
      nhead: 4
      dropout: 0.2
      dim_feedforward: 128
    include_start_in_aggregation: false
    learned_positional_encoding_max_size: 0
    learned_positional_encoding_only_masked: true

_wandb:
  m:
    - 1: known_cascade_len
      6: [2, 3]
      7: []
    - 1: loss.epoch.val.total
      5: 3
      6: [1, 3]
      7: [1]
    - 1: epoch
      6: []
      7: []
    - 1: loss.epoch.train.total
      5: 3
      6: [1, 3]
      7: [1]
    - 1: loss.epoch.val_best
      5: 3
      6: [1, 3]
      7: [1]
    - 1: lr
      5: 3
      6: [1, 3]
      7: []
    - 1: known_seq_len
      6: [2, 3]
      7: []
  t:
    1: [1, 5, 53]
    2: [1, 5, 53]
    3: [2, 3, 7, 15, 16, 55, 62, 63, 65]
    4: "3.11.7"
    5: "0.20.1"
    12: "0.20.1"
    13: "linux-x86_64"
  cli_version: "0.20.1"
  python_version: "3.11.7"

dataset: lemat_62

tokeniser:
  name: lemat_62_sg_multiplicity
  dtype: int16
  token_fields:
    engineered:
      multiplicity:
        type: map
        inputs:
          - spacegroup_number
          - site_symmetries
          - sites_enumeration
    pure_categorical:
      - site_symmetries
      - elements
      - sites_enumeration
  sequence_fields:
    counters:
      composition: elements
    space_group:
      - spacegroup_number
  augmented_token_fields:
    - sites_enumeration

evaluation:
  n_structures_to_generate: 10000

optimisation:
  epochs: 1000000
  optimiser:
    name: SGDScheduleFree
    config:
      lr: 0.2
    module: schedulefree
  clip_grad_norm: 2
  validation_period: 1000
  early_stopping_patience_epochs: 100000